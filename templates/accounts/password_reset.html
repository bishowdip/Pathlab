{% extends "base.html" %}
{% block content %}
<section class="max-w-md mx-auto px-4 py-20">
  <h1 class="text-3xl font-extrabold tracking-tight">Forgot password?</h1>
  <p class="mt-2 text-sm text-ink/60">Enter your email — we'll send a reset link.</p>
  <form method="post" class="mt-8 space-y-4">
    {% csrf_token %}
    <input type="email" name="email" required placeholder="you@example.com"
      class="w-full rounded-xl border border-ink/15 bg-white px-4 py-3">
    <button class="w-full rounded-full bg-ink text-paper py-3 font-semibold">Send reset link</button>
  </form>
</section>
{% endblock %}
