{% extends "base.html" %}
{% block title %}Confirm your email · {{ site.brand_name }}{% endblock %}
{% block content %}
<section class="max-w-md mx-auto px-4 py-16 text-center">
  <div class="text-5xl">📬</div>
  <h1 class="mt-4 text-3xl font-extrabold tracking-tight">Check your inbox</h1>
  <p class="mt-3 text-ink/60">
    We've sent a confirmation link to your email. Click it to activate your account and sign in.
  </p>
  <p class="mt-6 text-sm text-ink/50">
    Didn't get it? <a href="{% url 'accounts:resend_verification' %}" class="text-entrance-700 font-semibold hover:underline">Resend the link</a>.
  </p>
</section>
{% endblock %}
