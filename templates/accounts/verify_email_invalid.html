{% extends "base.html" %}
{% block title %}Link expired · {{ site.brand_name }}{% endblock %}
{% block content %}
<section class="max-w-md mx-auto px-4 py-16 text-center">
  <div class="text-5xl">⚠️</div>
  <h1 class="mt-4 text-3xl font-extrabold tracking-tight">That link is invalid or expired</h1>
  <p class="mt-3 text-ink/60">
    Confirmation links expire after one use. Request a fresh one and try again.
  </p>
  <a href="{% url 'accounts:resend_verification' %}"
     class="inline-block mt-6 rounded-full bg-ink text-paper px-5 py-2.5 font-semibold">
    Resend verification email
  </a>
</section>
{% endblock %}
