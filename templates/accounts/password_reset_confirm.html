{% extends "base.html" %}
{% block content %}
<section class="max-w-md mx-auto px-4 py-20">
  {% if validlink %}
  <h1 class="text-3xl font-extrabold tracking-tight">Set a new password</h1>
  <form method="post" class="mt-8 space-y-4">
    {% csrf_token %}
    {% for field in form %}
      <label class="block text-sm">
        <span class="text-ink/70 font-medium">{{ field.label }}</span>
        <input type="password" name="{{ field.name }}"
          class="mt-1 w-full rounded-xl border border-ink/15 bg-white px-4 py-3">
        {% if field.help_text %}<span class="block mt-1 text-xs text-ink/50">{{ field.help_text|safe }}</span>{% endif %}
        {% if field.errors %}<span class="block mt-1 text-xs text-red-600">{{ field.errors|join:" " }}</span>{% endif %}
      </label>
    {% endfor %}
    <button class="w-full rounded-full bg-ink text-paper py-3 font-semibold">Set password</button>
  </form>
  {% else %}
  <h1 class="text-2xl font-extrabold">Link expired.</h1>
  <p class="mt-3 text-ink/60">Please <a href="{% url 'accounts:password_reset' %}" class="underline font-semibold">request a new one</a>.</p>
  {% endif %}
</section>
{% endblock %}
