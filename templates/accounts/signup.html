{% extends "base.html" %}
{% block content %}
<section class="max-w-md mx-auto px-4 py-16">
  <h1 class="text-3xl font-extrabold tracking-tight">Try for free.</h1>
  <p class="mt-2 text-ink/60 text-sm">Create an account — it takes 15 seconds.</p>
  <form method="post" class="mt-8 space-y-4">
    {% csrf_token %}
    {% for field in form %}
      <label class="block text-sm">
        <span class="text-ink/70 font-medium">{{ field.label }}</span>
        {% if field.name == 'role' %}
          <select name="{{ field.name }}" class="mt-1 w-full rounded-xl border border-ink/15 bg-white px-4 py-3">
            {% for val, label in field.field.choices %}
              <option value="{{ val }}" {% if field.value == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        {% else %}
          <input name="{{ field.name }}" value="{{ field.value|default:'' }}"
            type="{% if 'password' in field.name %}password{% else %}text{% endif %}"
            class="mt-1 w-full rounded-xl border border-ink/15 bg-white px-4 py-3 focus:border-entrance-500 focus:ring-2 focus:ring-entrance-100 outline-none">
        {% endif %}
        {% if field.help_text %}<span class="block mt-1 text-xs text-ink/50">{{ field.help_text|safe }}</span>{% endif %}
        {% if field.errors %}<span class="block mt-1 text-xs text-red-600">{{ field.errors|join:" " }}</span>{% endif %}
      </label>
    {% endfor %}
    <button class="w-full rounded-full bg-ink text-paper py-3 font-semibold">Create account</button>
  </form>
  <p class="mt-6 text-sm text-ink/60">Already a member? <a href="{% url 'accounts:login' %}" class="font-semibold text-ink underline">Log in</a></p>
</section>
{% endblock %}
