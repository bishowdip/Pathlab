{% extends "base.html" %}
{% block content %}
<section class="max-w-md mx-auto px-4 py-16 text-center">
  <div class="text-5xl">🚧</div>
  <h1 class="mt-4 text-2xl font-extrabold">Instructors only</h1>
  <p class="mt-3 text-ink/60 text-sm">
    Your account isn't set up as an instructor. Edit your profile to change your role,
    or contact support if you think this is a mistake.
  </p>
  <div class="mt-6 flex gap-3 justify-center">
    <a href="{% url 'accounts:profile' %}" class="rounded-full bg-ink text-paper px-4 py-2 text-sm font-semibold">Edit profile</a>
    <a href="{% url 'support:chat' %}" class="rounded-full border border-ink/15 px-4 py-2 text-sm font-semibold">Contact support</a>
  </div>
</section>
{% endblock %}
