{% extends "base.html" %}
{% block content %}
<section class="max-w-5xl mx-auto px-4 py-8">
  <div class="text-xs uppercase tracking-wider text-ink/50 font-semibold">Instructor workspace</div>
  {% if messages %}
    {% for m in messages %}
      <div class="mt-3 rounded-2xl px-4 py-3 text-sm
                  {% if m.tags == 'error' %}bg-red-50 text-red-700
                  {% else %}bg-entrance-50 text-entrance-700{% endif %}">{{ m }}</div>
    {% endfor %}
  {% endif %}
  {% block teach %}{% endblock %}
</section>
{% endblock %}
